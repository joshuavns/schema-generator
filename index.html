<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schema Generator — Ring Ring Marketing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #202124;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: #1a56db;
      color: white;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.2px; }
    .header .brand { font-size: 12px; opacity: 0.75; }

    .tabs {
      background: white;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 20px;
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }
    .tab {
      padding: 11px 18px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 13.5px;
      font-weight: 500;
      color: #5f6368;
      border-bottom: 3px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      border-radius: 4px 4px 0 0;
    }
    .tab:hover { color: #1a56db; background: #f0f4ff; }
    .tab.active { color: #1a56db; border-bottom-color: #1a56db; }

    .main { display: flex; flex: 1; overflow: hidden; }

    .form-panel {
      width: 48%;
      overflow-y: auto;
      padding: 22px 24px;
      background: white;
      border-right: 1px solid #e0e0e0;
    }

    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #1e1e1e;
    }
    .preview-header {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #2d2d2d;
      border-bottom: 1px solid #3d3d3d;
      flex-shrink: 0;
    }
    .preview-header span { color: #9cdcfe; font-family: 'Consolas', 'Courier New', monospace; font-size: 12.5px; }
    .copy-btn {
      background: #1a56db;
      color: white;
      border: none;
      padding: 5px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12.5px;
      font-weight: 600;
      transition: background 0.15s;
    }
    .copy-btn:hover { background: #1348b8; }
    .copy-btn.copied { background: #0d7c3d; }
    .preview-content { flex: 1; overflow-y: auto; padding: 16px 18px; }
    .preview-content pre {
      color: #d4d4d4;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .section { margin-bottom: 26px; }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #1a56db;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 13px;
      padding-bottom: 6px;
      border-bottom: 2px solid #e8eeff;
    }

    .field { margin-bottom: 11px; }
    .field label {
      display: block;
      font-size: 12.5px;
      font-weight: 500;
      color: #3c4043;
      margin-bottom: 4px;
    }
    .field label .req { color: #d93025; }
    .field label .hint { font-weight: 400; color: #80868b; font-size: 11.5px; }
    .field input[type="text"],
    .field input[type="url"],
    .field input[type="time"],
    .field textarea,
    .field select {
      width: 100%;
      padding: 7px 9px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 12.5px;
      color: #202124;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: white;
      font-family: inherit;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: #1a56db;
      box-shadow: 0 0 0 2px rgba(26,86,219,0.1);
    }
    .field textarea { resize: vertical; min-height: 66px; }

    .field-row { display: grid; gap: 10px; }
    .field-row.cols-2 { grid-template-columns: 1fr 1fr; }
    .field-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .field-row.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

    .checkbox-group { display: flex; flex-wrap: wrap; gap: 6px 12px; margin-top: 2px; }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12.5px;
      color: #3c4043;
      cursor: pointer;
    }
    .checkbox-item input[type="checkbox"] { cursor: pointer; width: 14px; height: 14px; }

    /* Mode toggle */
    .mode-toggle {
      display: flex;
      gap: 0;
      border: 1px solid #dadce0;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .mode-btn {
      flex: 1;
      padding: 8px 10px;
      border: none;
      background: white;
      cursor: pointer;
      font-size: 12.5px;
      font-weight: 500;
      color: #5f6368;
      transition: background 0.15s, color 0.15s;
      text-align: center;
    }
    .mode-btn:not(:last-child) { border-right: 1px solid #dadce0; }
    .mode-btn.active { background: #1a56db; color: white; }
    .mode-btn:not(.active):hover { background: #f0f4ff; color: #1a56db; }

    /* Location blocks */
    .location-block {
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 14px 14px 10px;
      margin-bottom: 10px;
      background: #fafbff;
    }
    .block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 11px;
    }
    .block-title { font-size: 12px; font-weight: 700; color: #1a56db; }
    .remove-btn {
      background: none;
      border: 1px solid #dadce0;
      color: #80868b;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11.5px;
      transition: all 0.15s;
    }
    .remove-btn:hover { border-color: #d93025; color: #d93025; background: #fce8e6; }
    .add-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 13px;
      border: 1px dashed #1a56db;
      color: #1a56db;
      background: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12.5px;
      font-weight: 500;
      margin-top: 2px;
      transition: background 0.15s;
    }
    .add-btn:hover { background: #f0f4ff; }

    .sub-section {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #e0e0e0;
    }
    .sub-section-title {
      font-size: 11px;
      font-weight: 600;
      color: #80868b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    /* FAQ pairs */
    .faq-pair {
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 13px 14px 10px;
      margin-bottom: 9px;
      background: #fafbff;
    }
    .faq-pair-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .faq-pair-num { font-size: 11.5px; font-weight: 700; color: #1a56db; }

    .info-note {
      background: #e8f0fe;
      border-left: 3px solid #1a56db;
      padding: 8px 10px;
      border-radius: 0 4px 4px 0;
      font-size: 12px;
      color: #3c4043;
      margin-bottom: 14px;
    }

    /* knowsAbout checkbox groups */
    .ka-groups { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .ka-group { border: 1px solid #e8eeff; border-radius: 5px; padding: 9px 11px; background: #fafbff; }
    .ka-group-title {
      font-size: 11px;
      font-weight: 700;
      color: #1a56db;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 7px;
    }
    .ka-group .checkbox-group { gap: 5px 14px; }

    /* Custom identifier input */
    .identifier-custom { margin-top: 7px; }

    /* FAQ link builder helper */
    .link-helper {
      display: flex;
      gap: 6px;
      margin-top: 5px;
      align-items: center;
    }
    .link-helper input {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 11.5px;
      color: #202124;
      outline: none;
      font-family: inherit;
      background: white;
    }
    .link-helper input:focus { border-color: #1a56db; box-shadow: 0 0 0 2px rgba(26,86,219,0.1); }
    .link-helper input::placeholder { color: #aaa; }
    .link-insert-btn {
      white-space: nowrap;
      padding: 5px 11px;
      border: 1px solid #1a56db;
      background: none;
      color: #1a56db;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11.5px;
      font-weight: 600;
      transition: background 0.15s;
    }
    .link-insert-btn:hover { background: #f0f4ff; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Schema Markup Generator</h1>
    <span class="brand">Ring Ring Marketing</span>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-type="local-business">Local Business</button>
    <button class="tab" data-type="service">Service</button>
    <button class="tab" data-type="product">Product</button>
    <button class="tab" data-type="faq">FAQ</button>
    <button class="tab" data-type="article">Article</button>
    <button class="tab" data-type="city-page">City Page</button>
    <button class="tab" data-type="organization">Organization</button>
  </div>

  <div class="main">
    <div class="form-panel" id="form-panel"></div>
    <div class="preview-panel">
      <div class="preview-header">
        <span id="preview-label">JSON-LD Output</span>
        <button class="copy-btn" id="copy-btn">Copy</button>
      </div>
      <div class="preview-content">
        <pre id="output"></pre>
      </div>
    </div>
  </div>

<script>
let currentType = 'local-business';
let lbMode = 'homepage'; // 'homepage' or 'per-location'
let cpMode  = 'single';  // 'single' or 'multi'

document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentType = tab.dataset.type;
  renderForm(currentType);
  updatePreview();
});

// ── Form templates ────────────────────────────────────────────────────────────
const forms = {

  'local-business': () => `

      <div class="field-row cols-2">

        <div class="field"><label>Price Range</label>
          <select id="lb-price">
            <option value="$">$</option><option value="$$">$$</option>
            <option value="$$$">$$$</option><option value="$$$$" selected>$$$$</option>

      </div>
      <div class="field"><label>Payment Accepted</label>
        <div class="checkbox-group">
          <label class="checkbox-item"><input type="checkbox" class="lb-payment" value="Cash" checked> Cash</label>

      <div class="field-row cols-2">

          <input type="text" id="lb-currency" value="USD"></div>

          <input type="url" id="lb-map" placeholder="https://maps.app.goo.gl/..."></div>

    <div class="section">

function locationBlockHTML(prefix, index) {
  return `
    <div class="location-block" data-index="${index}">
      <div class="block-header">
        <span class="block-title">Location ${index + 1}</span>
        <button class="remove-btn" onclick="removeLocation('${prefix}', ${index})">Remove</button>
      </div>

      <div class="field"><label>Branch / Location Name <span class="hint">(optional)</span></label>
        <input type="text" class="${prefix}-loc-name" placeholder="e.g. Smith-Corcoran Chicago Funeral Home"></div>
      <div class="field"><label>Street Address</label>
        <input type="text" class="${prefix}-loc-street" placeholder="e.g. 6150 N Cicero Ave"></div>
      <div class="field-row cols-3">
        <div class="field"><label>City</label>
          <input type="text" class="${prefix}-loc-city" placeholder="Chicago"></div>
        <div class="field"><label>State</label>
          <input type="text" class="${prefix}-loc-state" placeholder="IL"></div>
        <div class="field"><label>Zip Code</label>
          <input type="text" class="${prefix}-loc-zip" placeholder="60646"></div>
      </div>
      <div class="field-row cols-2">
        <div class="field"><label>Country</label>
          <input type="text" class="${prefix}-loc-country" value="US"></div>
        <div class="field"><label>Phone</label>
          <input type="text" class="${prefix}-loc-phone" placeholder="(555) 123-4567"></div>
      </div>

      ${prefix === 'lb' ? `
      <div class="sub-section">
        <div class="sub-section-title">For Per-Location Schema</div>
        <div class="field"><label>Location Page URL</label>
          <input type="url" class="lb-loc-url" placeholder="https://www.example.com/about/chicago/"></div>
        <div class="field"><label>hasMap URL <span class="hint">(Google Maps link for this branch)</span></label>
          <input type="url" class="lb-loc-map" placeholder="https://maps.app.goo.gl/..."></div>
      </div>

      <div class="sub-section">

// ── Render form ───────────────────────────────────────────────────────────────
function renderForm(type) {
  const panel = document.getElementById('form-panel');
  panel.innerHTML = forms[type]();

  if (type === 'local-business') {
    document.getElementById('lb-mode-toggle').addEventListener('click', e => {
      const btn = e.target.closest('.mode-btn');
      if (!btn) return;
      lbMode = btn.dataset.mode;
      document.querySelectorAll('#lb-mode-toggle .mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updatePreview();
    });
    document.getElementById('lb-add-location').addEventListener('click', () => { addLocation('lb'); updatePreview(); });
    addLocation('lb');
  } else if (type === 'service') {
    document.getElementById('svc-add-location').addEventListener('click', () => { addLocation('svc'); updatePreview(); });
    addLocation('svc');
  } else if (type === 'product') {
    document.getElementById('prod-add-location').addEventListener('click', () => { addLocation('prod'); updatePreview(); });
    addLocation('prod');
  } else if (type === 'faq') {
    document.getElementById('faq-add-pair').addEventListener('click', () => { addFAQPair(); updatePreview(); });
    addFAQPair();
    addFAQPair();
  } else if (type === 'city-page') {
    document.getElementById('cp-mode-toggle').addEventListener('click', e => {
      const btn = e.target.closest('.mode-btn');
      if (!btn) return;
      cpMode = btn.dataset.mode;
      document.querySelectorAll('#cp-mode-toggle .mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('cp-tel-wrap').style.display          = cpMode === 'multi' ? 'none' : '';
      document.getElementById('cp-address-section').style.display   = cpMode === 'multi' ? 'none' : '';
      document.getElementById('cp-departments-section').style.display = cpMode === 'single' ? 'none' : '';
      updatePreview();
    });
    document.getElementById('cp-reset-btn').addEventListener('click', () => {
      cpMode = 'single';
      renderForm('city-page');
      updatePreview();
    });
    document.getElementById('cp-industry').addEventListener('change', e => {
      applyIndustryPreset(e.target.value);
    });
    document.getElementById('cp-add-service').addEventListener('click', () => { addCPService(); updatePreview(); });
    document.getElementById('cp-add-faq').addEventListener('click', () => { addCPFAQ(); updatePreview(); });
    document.getElementById('cp-add-dept').addEventListener('click', () => { addCPDept(); updatePreview(); });
    addCPService();
    addCPService();
    addCPService();
    addCPFAQ();
    addCPFAQ();
    addCPFAQ();
    if (cpMode === 'multi') { addCPDept(); addCPDept(); }
  } else if (type === 'organization') {
    document.getElementById('org-industry').addEventListener('change',      e  => { applyOrgPreset(e.target.value); });
    document.getElementById('org-add-addtype').addEventListener('click',    () => { addOrgRow('org-addtype-list',    'org-addtype-url',    'https://www.wikidata.org/wiki/Q...'); updatePreview(); });
    document.getElementById('org-add-identifier').addEventListener('click', () => { addOrgRow('org-identifier-list', 'org-identifier-url', 'http://www.productontology.org/id/...'); updatePreview(); });
    document.getElementById('org-add-owner-ka').addEventListener('click',   () => { addOrgRow('org-owner-ka-list',  'org-owner-ka-url',   'http://www.productontology.org/id/...'); updatePreview(); });
    document.getElementById('org-add-service').addEventListener('click',    () => { addOrgServiceRow(); updatePreview(); });
    document.getElementById('org-add-profile').addEventListener('click',    () => { addOrgRow('org-profiles-list',  'org-profile-url',    'https://www.yelp.com/biz/...'); updatePreview(); });
    document.getElementById('org-add-cityref').addEventListener('click',    () => { addOrgRow('org-cityref-list',   'org-cityref-url',    'https://en.wikipedia.org/wiki/...'); updatePreview(); });
  }

  panel.addEventListener('input', updatePreview);
  panel.addEventListener('change', updatePreview);
}

// ── City Page service reorder ──────────────────────────────────────────────────
function moveCPService(index, direction) {
  const container = document.getElementById('cp-services');
  const items = container.querySelectorAll('.faq-pair');
  const targetIndex = index + direction;
  if (targetIndex < 0 || targetIndex >= items.length) return;

  const data = Array.from(items).map(item => ({
    name: item.querySelector('.cp-svc-name').value,
    desc: item.querySelector('.cp-svc-desc').value
  }));

  [data[index], data[targetIndex]] = [data[targetIndex], data[index]];

  container.innerHTML = '';
  data.forEach((svc, i) => {
    container.insertAdjacentHTML('beforeend', cpServiceHTML(i));
    const row = container.querySelectorAll('.faq-pair')[i];
    row.querySelector('.cp-svc-name').value = svc.name;
    row.querySelector('.cp-svc-desc').value = svc.desc;
  });

  updatePreview();
}

// ── Build LocalBusiness schema object ─────────────────────────────────────────
function buildLBSchema(opts) {
  // opts: { name, url, mainPage, id, tel, mapUrl, image, desc, disambig, price,
  //         payment, currency, altNames, addType, identifier, lang, services,
  //         socialUrls, agent, founder, knowsAbout, foundCity, foundState,
  //         days, opens, closes, locations, mode }
  const {
    name, url, mainPage, schemaId, tel, mapUrl, image, desc, disambig, price,
    payment, currency, altNames, addType, identifier, lang,
    services, socialUrls, agent, founder, knowsAbout,
    foundCity, foundState, days, opens, closes, locations
  } = opts;

  const schema = { "@context": "https://schema.org", "@type": "LocalBusiness" };

  if (schemaId) schema["@id"] = schemaId;
  if (name)     schema.name   = name;
  if (addType)  schema.additionalType = [addType];
  if (identifier) schema.identifier  = [identifier];
  if (altNames.length) schema.alternateName = altNames;
  if (url)      { schema.url = url; schema.mainEntityOfPage = mainPage || url; }
  if (image)    schema.image = [image];
  schema.priceRange = price;
  if (payment.length) schema.paymentAccepted = payment;
  schema.currenciesAccepted = currency;
  if (desc)     schema.description = desc;
  if (disambig) schema.disambiguatingDescription = disambig;
  if (mapUrl)   schema.hasMap      = mapUrl;
  if (tel)      schema.telephone   = tel;

  // Address — no telephone in LB address objects
  const addresses = locations.map(loc => {
    const a = { "@type": "PostalAddress" };
    if (loc.street)  a.streetAddress   = loc.street;
    if (loc.city)    a.addressLocality  = loc.city;
    if (loc.state)   a.addressRegion    = loc.state;
    if (loc.zip)     a.postalCode       = loc.zip;
    if (loc.country) a.addressCountry   = loc.country;
    return a;
  }).filter(a => Object.keys(a).length > 1);

  if (addresses.length === 1)    schema.address = addresses[0];
  else if (addresses.length > 1) schema.address = addresses;

  // Founder
  if (founder) {
    schema.founder = { "@type": "Person", name: founder };
    if (knowsAbout.length) schema.founder.knowsAbout = knowsAbout;
    if (foundCity || foundState) {
      schema.founder.workLocation = {
        "@type": "Place",
        address: {
          "@type": "PostalAddress",
          ...(foundCity  && { addressLocality: foundCity }),
          ...(foundState && { addressRegion:   foundState })
        }
      };
    }
  }

  schema.knowsLanguage = lang || 'en';

  if (foundCity || foundState) {
    schema.foundingLocation = {
      "@type": "Place",
      address: {
        "@type": "PostalAddress",
        ...(foundCity  && { addressLocality: foundCity }),
        ...(foundState && { addressRegion:   foundState })
      }
    };
  }

  // Hours
  if (days.length) {
    schema.openingHoursSpecification = {
      "@type": "OpeningHoursSpecification",
      dayOfWeek: days,
      opens,
      closes
    };
  }

  // areaServed — GeoCircle per location
  const geoCircles = locations.filter(l => l.lat && l.lng).map(loc => ({
    "@type": "GeoCircle",
    geoMidpoint: {
      "@type": "GeoCoordinates",
      latitude:  loc.lat,
      longitude: loc.lng
    },
    ...(loc.radius && { geoRadius: loc.radius })
  }));
  if (geoCircles.length === 1)    schema.areaServed = geoCircles[0];
  else if (geoCircles.length > 1) schema.areaServed = geoCircles;

  // contactPoint — one per location
  const contactPoints = locations.filter(l => l.phone || l.name).map(loc => ({
    "@type": "ContactPoint",
    ...(loc.name  && { name: loc.name }),
    availableLanguage: lang || 'en',
    ...(loc.phone && { telephone: loc.phone }),
    ...(loc.city && loc.state && { areaServed: [`${loc.city}, ${loc.state}`] }),
    contactType: ["Customer Support"]
  }));
  if (contactPoints.length === 1)    schema.contactPoint = contactPoints[0];
  else if (contactPoints.length > 1) schema.contactPoint = contactPoints;

  // potentialAction
  if (services.length || socialUrls.length || agent || name) {
    const action = { "@type": "InteractAction" };
    if (services.length) action.result = { "@type": "OfferCatalog", name: services };
    if (agent)           action.agent  = { "@type": "Person", name: agent };

    const participant = {};
    if (name)              participant.name   = name;
    if (url)               participant.url    = url;
    if (socialUrls.length) participant.sameAs = socialUrls;
    if (Object.keys(participant).length) {
      action.participant = { "@type": "Organization", ...participant };
    }

    const actionLocations = locations.filter(l => l.city && l.state).map(loc => {
      const geoLinks = [];
      if (loc.wiki)     geoLinks.push(loc.wiki);
      if (loc.wikidata) geoLinks.push(loc.wikidata);
      if (loc.geonames) geoLinks.push(loc.geonames);
      geoLinks.push(`https://www.google.com/search?q=${encodeURIComponent(loc.city + '%2C+' + loc.state)}`);
      return {
        "@type": "Place",
        address: { "@type": "PostalAddress", addressLocality: loc.city, addressRegion: loc.state },
        sameAs: geoLinks
      };
    });
    if (actionLocations.length === 1)    action.location = actionLocations[0];
    else if (actionLocations.length > 1) action.location = actionLocations;

    schema.potentialAction = action;
  }

  return schema;
}

  'local-business': () => {

    const foundState = v('lb-founding-state');
    const opens      = document.getElementById('lb-opens')?.value  || '00:00';

    const altNames   = altNamesRaw ? altNamesRaw.split('\n').map(s => s.trim()).filter(Boolean) : [];
    const services   = servicesRaw ? servicesRaw.split('\n').map(s => s.trim()).filter(Boolean) : [];
    const socialUrls = socialRaw   ? socialRaw.split('\n').map(s => s.trim()).filter(Boolean)   : [];
    const knowsAbout = Array.from(document.querySelectorAll('.lb-ka:checked')).map(c => c.value);
    const locations  = getLBLocations();

    const shared = {
      desc, disambig, price, payment, currency, altNames, addType, identifier, lang,
      services, socialUrls, agent, founder, knowsAbout, foundCity, foundState,
      days, opens, closes, image
    };

    if (lbMode === 'homepage') {
      // Single schema — all locations combined
      const schemaId = homepageUrl ? homepageUrl.replace(/\/$/, '') + '/#business' : '';
      const schema = buildLBSchema({
        ...shared,
        name, url: homepageUrl, mainPage: homepageUrl, schemaId,
        tel, mapUrl, locations
      });
      return JSON.stringify(schema, null, 2);

    } else {
      // One schema block per location
      const blocks = locations.map((loc, i) => {
        const locUrl   = loc.url || homepageUrl;
        const schemaId = locUrl ? locUrl.replace(/\/$/, '') + '#business' : '';
        const locName  = loc.name || name;
        const locTel   = loc.phone || tel;
        const locMap   = loc.mapUrl || mapUrl;

        const schema = buildLBSchema({
          ...shared,
          name: locName,
          url: locUrl,
          mainPage: locUrl,
          schemaId,
          tel: locTel,
          mapUrl: locMap,
          locations: [loc]
        });

        // For per-location: participant uses branch name/url
        if (schema.potentialAction?.participant) {
          schema.potentialAction.participant.name = locName;
          schema.potentialAction.participant.url  = locUrl;
        }

        const label = loc.name ? `// ─── ${loc.name} ───` : `// ─── Location ${i + 1} ───`;
        return `${label}\n<script type="application/ld+json">\n${JSON.stringify(schema, null, 2)}\n<\/script>`;
      });

      return blocks.join('\n\n');
    }
  },

  'city-page': () => {
    const v = id => document.getElementById(id)?.value.trim() || '';
    const pageUrl        = v('cp-page-url');
    const schemaIdSuffix = v('cp-schema-id');
    const name           = v('cp-name');
    const homepageUrl    = v('cp-url');
    const tel            = v('cp-tel');
    const image          = v('cp-image');
    const addType        = v('cp-addtype');
    const street         = v('cp-street');
    const city           = v('cp-city');
    const state          = v('cp-state');
    const zip            = v('cp-zip');
    const country        = v('cp-country') || 'US';
    const targetCity     = v('cp-target-city');
    const targetState    = v('cp-target-state');
    const catalogInput   = v('cp-catalog-name');

    const lbId     = homepageUrl ? homepageUrl.replace(/\/$/, '') + '/#' + schemaIdSuffix : '';
    const faqId    = pageUrl     ? pageUrl.replace(/\/$/, '')     + '/#faq'               : '';
    const areaName = [targetCity, targetState].filter(Boolean).join(', ');
    const catalogName = catalogInput || (name && areaName ? `Our ${name} Services in ${areaName}` : '');

    const services = Array.from(document.querySelectorAll('#cp-services .faq-pair'))
      .map(s => ({ name: s.querySelector('.cp-svc-name')?.value.trim() || '', desc: s.querySelector('.cp-svc-desc')?.value.trim() || '' }))
      .filter(s => s.name || s.desc);

    const faqs = Array.from(document.querySelectorAll('#cp-faq-pairs .faq-pair'))
      .map(p => ({ q: p.querySelector('.cp-faq-q')?.value.trim() || '', a: p.querySelector('.cp-faq-a')?.value.trim() || '' }))
      .filter(p => p.q || p.a);

    // Build LocalBusiness — property order matches target output
    const lb = { "@type": "LocalBusiness" };
    if (lbId)        lb["@id"]         = lbId;
    if (name)        lb.name            = name;
    if (homepageUrl) lb.url             = homepageUrl;

    // Single mode: telephone at top level; multi mode: telephone lives in each department
    if (cpMode === 'single' && tel) lb.telephone = tel;

    if (image)   lb.image          = image;
    if (addType) lb.additionalType = addType;

    if (cpMode === 'single') {
      const addr = { "@type": "PostalAddress" };
      if (street)  addr.streetAddress   = street;
      if (city)    addr.addressLocality  = city;
      if (state)   addr.addressRegion    = state;
      if (zip)     addr.postalCode       = zip;
      if (country) addr.addressCountry   = country;
      if (Object.keys(addr).length > 1) lb.address = addr;
    } else {
      const depts = Array.from(document.querySelectorAll('#cp-departments .location-block')).map(d => {
        const label    = d.querySelector('.cp-dept-label')?.value.trim()   || '';
        const slug     = d.querySelector('.cp-dept-slug')?.value.trim()    || '';
        const dPhone   = d.querySelector('.cp-dept-phone')?.value.trim()   || '';
        const dStreet  = d.querySelector('.cp-dept-street')?.value.trim()  || '';
        const dCity    = d.querySelector('.cp-dept-city')?.value.trim()    || '';
        const dState   = d.querySelector('.cp-dept-state')?.value.trim()   || '';
        const dZip     = d.querySelector('.cp-dept-zip')?.value.trim()     || '';
        const dCountry = d.querySelector('.cp-dept-country')?.value.trim() || 'US';

        const dept = { "@type": "LocalBusiness" };
        if (slug)   dept["@id"]    = homepageUrl ? homepageUrl.replace(/\/$/, '') + '/#' + slug + '-location' : '';
        if (label)  dept.name      = name ? `${name} - ${label}` : label;
        if (dPhone) dept.telephone = dPhone;

        const dAddr = { "@type": "PostalAddress" };
        if (dStreet)  dAddr.streetAddress   = dStreet;
        if (dCity)    dAddr.addressLocality  = dCity;
        if (dState)   dAddr.addressRegion    = dState;
        if (dZip)     dAddr.postalCode       = dZip;
        if (dCountry) dAddr.addressCountry   = dCountry;
        if (Object.keys(dAddr).length > 1) dept.address = dAddr;

        return dept;
      }).filter(d => d.name || d["@id"]);

      if (depts.length) lb.department = depts;
    }

    if (areaName) lb.areaServed = { "@type": "City", name: areaName };

    if (services.length) {
      lb.hasOfferCatalog = {
        "@type": "OfferCatalog",
        name: catalogName,
        itemListElement: services.map(s => ({
          "@type": "Offer",
          itemOffered: Object.assign(
            { "@type": "Service", name: s.name, serviceType: s.name },
            s.desc ? { description: s.desc } : {}
          )
        }))
      };
    }

    // Build FAQPage
    const faqPage = { "@type": "FAQPage" };
    if (faqId) faqPage["@id"] = faqId;
    if (faqs.length) {
      faqPage.mainEntity = faqs.map(p => ({
        "@type": "Question",
        name: p.q,
        acceptedAnswer: { "@type": "Answer", text: p.a }
      }));
    }

    return JSON.stringify({ "@context": "https://schema.org", "@graph": [lb, faqPage] }, null, 2);
  },

  'organization': () => {
    const v = id => document.getElementById(id)?.value.trim() || '';

    const name          = v('org-name');
    const url           = v('org-url');
    const altNamesRaw   = v('org-altnames');
    const logo          = v('org-logo');
    const desc          = v('org-desc');
    const disambig      = v('org-disambig');
    const street        = v('org-street');
    const city          = v('org-city');
    const state         = v('org-state');
    const zip           = v('org-zip');
    const country       = v('org-country') || 'US';
    const foundingCity  = v('org-founding-city');
    const foundingState = v('org-founding-state');
    const ownerName     = v('org-owner-name');
    const ownerCity     = v('org-owner-city');
    const ownerState    = v('org-owner-state');
    const phone         = v('org-phone');
    const cpName        = v('org-cp-name');
    const contactType   = document.getElementById('org-contact-type')?.value || 'customer support';
    const cpAreaRaw     = v('org-cp-areaserved');
    const areaServedText = v('org-areaserved-text');
    const lat           = v('org-lat');
    const lng           = v('org-lng');
    const radiusMiles   = v('org-radius');
    const opens         = v('org-opens') || '08:00';
    const closes        = v('org-closes') || '17:00';

    const alternateName = altNamesRaw ? altNamesRaw.split(',').map(s => s.trim()).filter(Boolean) : [];
    const cpAreaServed  = cpAreaRaw   ? cpAreaRaw.split(',').map(s => s.trim()).filter(Boolean)   : [];
    const addTypes      = Array.from(document.querySelectorAll('.org-addtype-url')).map(i => i.value.trim()).filter(Boolean);
    const identifiers   = Array.from(document.querySelectorAll('.org-identifier-url')).map(i => i.value.trim()).filter(Boolean);
    const ownerKA       = Array.from(document.querySelectorAll('.org-owner-ka-url')).map(i => i.value.trim()).filter(Boolean);
    const services      = Array.from(document.querySelectorAll('.org-service-name')).map(i => i.value.trim()).filter(Boolean);
    const profiles      = Array.from(document.querySelectorAll('.org-profile-url')).map(i => i.value.trim()).filter(Boolean);
    const cityRefs      = Array.from(document.querySelectorAll('.org-cityref-url')).map(i => i.value.trim()).filter(Boolean);
    const days          = Array.from(document.querySelectorAll('.org-day:checked')).map(cb => cb.value);

    const schema = { "@context": "https://schema.org", "@type": "Organization" };

    if (url)                schema["@id"]                    = url;
    if (name)               schema.name                      = name;
    if (addTypes.length)    schema.additionalType            = addTypes;
    if (identifiers.length) schema.identifier                = identifiers;
    if (alternateName.length) schema.alternateName           = alternateName;
    if (url)                schema.url                       = url;
    if (url)                schema.mainEntityOfPage          = url;
    if (logo)               schema.logo                      = [logo];
    if (desc)               schema.description               = desc;
    if (disambig)           schema.disambiguatingDescription = disambig;
    if (phone)              schema.telephone                 = phone;

    // Address
    const addr = { "@type": "PostalAddress" };
    if (street)  addr.streetAddress   = street;
    if (city)    addr.addressLocality  = city;
    if (state)   addr.addressRegion    = state;
    if (zip)     addr.postalCode       = zip;
    if (country) addr.addressCountry   = country;
    if (Object.keys(addr).length > 1) schema.address = addr;

    // Owner
    if (ownerName) {
      const owns = { "@type": "Person", name: ownerName };
      if (ownerKA.length) owns.knowsAbout = ownerKA;
      if (ownerCity || ownerState) {
        const wAddr = { "@type": "PostalAddress" };
        if (ownerCity)  wAddr.addressLocality = ownerCity;
        if (ownerState) wAddr.addressRegion   = ownerState;
        owns.workLocation = { "@type": "Place", address: wAddr };
      }
      schema.owns = owns;
    }

    schema.knowsLanguage = "en";

    // Founding location
    if (foundingCity || foundingState) {
      const fAddr = { "@type": "PostalAddress" };
      if (foundingCity)  fAddr.addressLocality = foundingCity;
      if (foundingState) fAddr.addressRegion   = foundingState;
      schema.foundingLocation = { "@type": "Place", address: fAddr };
    }

    // Area served — GeoCircle takes priority; fall back to text
    if (lat && lng) {
      const radiusMeters = radiusMiles ? String(Math.round(parseFloat(radiusMiles) * 1609.34)) : "16093";
      schema.areaServed = {
        "@type": "GeoCircle",
        geoMidpoint: { "@type": "GeoCoordinates", latitude: lat, longitude: lng },
        geoRadius: radiusMeters
      };
    } else if (areaServedText) {
      schema.areaServed = areaServedText;
    }

    // Contact point
    if (phone) {
      const cp = { "@type": "contactPoint", availableLanguage: "en", telephone: phone };
      if (cpName)              cp.name       = cpName;
      if (cpAreaServed.length) cp.areaserved = cpAreaServed;
      cp.contactType = contactType;
      schema.contactPoint = cp;
    }

    // Potential action
    const action = { "@type": "InteractAction" };
    if (services.length) {
      action.result = { "@type": "OfferCatalog", name: services };
    }
    action.agent = { "@type": "Person", name: "Customer Support" };

    const participant = { "@type": "Organization" };
    if (name)            participant.name   = name;
    if (url)             participant.url    = url;
    if (profiles.length) participant.sameAs = profiles;
    action.participant = participant;

    const locAddr = { "@type": "PostalAddress" };
    if (city)  locAddr.addressLocality = city;
    if (state) locAddr.addressRegion   = state;
    const loc = { "@type": "Place" };
    if (Object.keys(locAddr).length > 1) loc.address = locAddr;
    if (cityRefs.length) loc.sameAs = cityRefs;
    if (days.length) {
      loc.openingHoursSpecification = {
        "@type": "OpeningHoursSpecification",
        dayOfWeek: days,
        opens,
        closes
      };
    }
    if (Object.keys(loc).length > 1) action.location = loc;

    schema.potentialAction = action;

    return JSON.stringify(schema, null, 2);
  }
};

function applyOrgPreset(value) {
  if (!value) return;
  const preset = orgIndustryPresets[value];
  if (!preset) return;

  // Fill identifiers
  const list = document.getElementById('org-identifier-list');
  list.innerHTML = '';
  preset.identifiers.forEach(url => {
    list.insertAdjacentHTML('beforeend',
      `<div class="org-row" style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">` +
      `<input type="url" class="org-identifier-url" value="${url}" style="flex:1">` +
      `<button class="remove-btn" onclick="this.closest('.org-row').remove();updatePreview()">Remove</button>` +
      `</div>`);
  });

  // Fill alternate names
  const altInput = document.getElementById('org-altnames');
  if (altInput && preset.alternateNames) {
    altInput.value = preset.alternateNames.join(', ');
  }

  updatePreview();
}

// ── Update preview ────────────────────────────────────────────────────────────
function updatePreview() {
  try {
    const json = generators[currentType]();

    let output;
    if (currentType === 'local-business' && lbMode === 'per-location') {
      // Already includes <script> tags per block
      output = json;
      document.getElementById('preview-label').textContent = 'JSON-LD Output — Per-Location Schemas';
    } else {
      output = `<script type="application/ld+json">\n${json}\n<\/script>`;
      document.getElementById('preview-label').textContent = 'JSON-LD Output';
    }

    document.getElementById('output').textContent = output;
  } catch (e) {
    document.getElementById('output').textContent = '// Error: ' + e.message;
  }
}

// ── Copy button ───────────────────────────────────────────────────────────────
document.getElementById('copy-btn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('output').textContent).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
});

document.addEventListener('change', e => {
  if (e.target.id === 'lb-identifier') {
    const val = e.target.value;
    // Show/hide custom input
    const wrap = document.getElementById('lb-identifier-custom-wrap');
    if (wrap) wrap.style.display = val === '__custom__' ? '' : 'none';
    // Auto-check knowsAbout suggestions
    const suggestions = identifierSuggestions[val] || [];
    document.querySelectorAll('.lb-ka').forEach(cb => {
      cb.checked = suggestions.includes(cb.value);
    });
    updatePreview();
  }
});

// ── FAQ link builder ──────────────────────────────────────────────────────────
function insertFAQLink(btn) {
  const pair   = btn.closest('.faq-pair');
  const ta     = pair.querySelector('textarea');
  const anchor = pair.querySelector('.link-anchor').value.trim();
  const url    = pair.querySelector('.link-url').value.trim();

  if (!anchor || !url) return;

  const linked = `<a href='${url}'>${anchor}</a>`;

  if (ta.value.includes(anchor)) {
    ta.value = ta.value.replace(anchor, linked);
  } else {
    ta.value = ta.value ? ta.value + ' ' + linked : linked;
  }

  pair.querySelector('.link-anchor').value = '';
  pair.querySelector('.link-url').value    = '';
  updatePreview();
}
